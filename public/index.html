<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defi Insider Signal Bot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;color:#e0e0e0;font-family:'Courier New',monospace;font-size:12px;}
.dash{padding:10px;min-height:100vh;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:#111;border:0.5px solid #222;border-radius:8px;margin-bottom:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;background:#1a3325;color:#4ade80;}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:8px;}
.sc{background:#111;border:0.5px solid #222;border-radius:7px;padding:9px 11px;}
.sc-label{font-size:10px;color:#444;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;}
.sc-val{font-size:22px;font-weight:600;}
.g{color:#4ade80;}.r{color:#f87171;}.y{color:#fbbf24;}.w{color:#fff;}.muted{color:#555;}

/* PAIR CARDS — main display */
.pairs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px;}
@media(max-width:800px){.pairs-grid{grid-template-columns:1fr;}}

.pair-card{background:#111;border:0.5px solid #222;border-radius:8px;overflow:hidden;}
.pair-card.has-buy{border-color:#2d5a3d;}
.pair-card.has-sell{border-color:#5a2d2d;}
.pair-card.has-hc{border-color:#4ade80;box-shadow:0 0 12px rgba(74,222,128,0.08);}

.pc-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0f0f0f;border-bottom:0.5px solid #1a1a1a;}
.pc-name{font-size:16px;font-weight:600;color:#fff;}
.pc-price{font-size:15px;color:#ccc;font-family:monospace;}
.pc-pct{font-size:12px;padding:2px 7px;border-radius:4px;}
.pc-pct.pos{background:#1a3325;color:#4ade80;}
.pc-pct.neg{background:#331a1a;color:#f87171;}

.pc-indicators{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:0.5px solid #1a1a1a;}
.pc-ind{padding:8px 10px;border-right:0.5px solid #1a1a1a;text-align:center;}
.pc-ind:last-child{border-right:none;}
.pc-ind-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.pc-ind-val{font-size:13px;font-weight:600;}

.pc-signals{padding:10px 14px;}
.pc-sig-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #141414;}
.pc-sig-row:last-child{border-bottom:none;}
.pc-sig-tf{font-size:10px;color:#555;min-width:50px;}
.pc-sig-dir{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;min-width:60px;text-align:center;}
.sig-buy{background:#1a3325;color:#4ade80;}
.sig-sell{background:#331a1a;color:#f87171;}
.sig-watch{background:#2a2a14;color:#fbbf24;}
.sig-hold{color:#333;}
.pc-sig-score{font-size:11px;}
.pc-sig-stars{font-size:11px;}
.pc-sig-trend{font-size:10px;color:#555;}

/* SIGNAL DETAIL CARDS */
.signals-section{margin-bottom:10px;}
.section-title{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;padding:0 2px;margin-bottom:8px;}
.signal-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(max-width:800px){.signal-cards{grid-template-columns:1fr;}}

.sig-card{background:#111;border-radius:8px;overflow:hidden;border:0.5px solid #222;}
.sig-card.buy{border-color:#2d5a3d;}
.sig-card.sell{border-color:#5a2d2d;}
.sig-card.hc{border-width:1px;}

.sig-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0f0f0f;}
.sig-card-pair{font-size:14px;font-weight:600;color:#fff;}
.sig-card-dir.buy{background:#1a3325;color:#4ade80;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;}
.sig-card-dir.sell{background:#331a1a;color:#f87171;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;}

.sig-card-scores{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid #1a1a1a;}
.score-ring{width:48px;height:48px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;}
.score-ring.high{border-color:#4ade80;background:#0a1f12;}
.score-ring.mid{border-color:#fbbf24;background:#1f1800;}
.score-num{font-size:16px;font-weight:600;line-height:1;}
.score-sub{font-size:8px;color:#555;margin-top:1px;}
.conf-pill{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;}
.conf-high{background:#1a3325;color:#4ade80;}
.conf-mid{background:#2a2a14;color:#fbbf24;}
.tf-pill{font-size:10px;padding:2px 7px;border-radius:4px;background:#1a1a2e;color:#60a5fa;}

.sig-card-fields{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;padding:10px 14px;border-bottom:0.5px solid #1a1a1a;}
.field{display:flex;flex-direction:column;gap:2px;}
.field-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.3px;}
.field-val{font-size:11px;font-weight:500;}
.field-val.green{color:#4ade80;}
.field-val.red{color:#f87171;}
.field-val.yellow{color:#fbbf24;}

.sig-card-note{font-size:10px;color:#555;padding:8px 14px;line-height:1.5;border-bottom:0.5px solid #1a1a1a;}
.sig-card-note.confirmed{color:#4ade80;background:#0a1f12;}
.sig-card-note.counter{color:#fbbf24;background:#1f1800;}
.sig-card-reasoning{font-size:10px;color:#444;padding:8px 14px;line-height:1.6;}

.log-panel{background:#111;border:0.5px solid #222;border-radius:8px;overflow:hidden;}
.log-ph{padding:7px 12px;border-bottom:0.5px solid #1a1a1a;background:#0f0f0f;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.4px;}
.llist{max-height:140px;overflow-y:auto;}
.li{padding:4px 12px;border-bottom:0.5px solid #141414;display:flex;gap:8px;font-size:11px;}
.lt{color:#2a2a2a;min-width:55px;}
.lbuy{color:#4ade80;}.lsell{color:#f87171;}.linfo{color:#3b82f6;}.lm{color:#555;}.lerr{color:#f59e0b;}

.scan-btn{font-size:10px;padding:3px 9px;border-radius:4px;border:0.5px solid #2a4a35;background:#1a3325;color:#4ade80;cursor:pointer;}
.scan-btn:disabled{opacity:.4;cursor:default;}
.no-signals{color:#2a2a2a;font-size:11px;padding:20px;text-align:center;}
</style>
</head>
<body>
<div class="dash">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="/logo.png" alt="Defi Insider" style="width:36px;height:36px;border-radius:6px;object-fit:cover;">
      <div style="display:flex;flex-direction:column;gap:1px;">
        <span style="font-size:15px;font-weight:600;color:#fff;">Defi Insider <span style="color:#c0392b;">Signal Bot</span></span>
        <span style="font-size:9px;color:#444;letter-spacing:.5px;">by DAMI-DEFI</span>
      </div>
      <span class="badge"><span class="live-dot"></span>Live</span>
      <span style="font-size:10px;color:#333;">BTC · ETH · SOL · BNB · 1H + 4H</span>
    </div>
    <span style="font-size:10px;color:#333;" id="clock">--:--:-- UTC</span>
  </div>

  <div class="stats">
    <div class="sc"><div class="sc-label">Pairs</div><div class="sc-val w">4</div></div>
    <div class="sc"><div class="sc-label">Buy Signals</div><div class="sc-val g" id="s-buy">—</div></div>
    <div class="sc"><div class="sc-label">Sell Signals</div><div class="sc-val r" id="s-sell">—</div></div>
    <div class="sc"><div class="sc-label">High Conf ★★★</div><div class="sc-val y" id="s-hc">—</div></div>
    <div class="sc"><div class="sc-label">Next Scan</div><div class="sc-val w" id="s-next">—</div></div>
  </div>

  <!-- PAIR OVERVIEW CARDS -->
  <div class="pairs-grid" id="pairs-grid">
    <div class="pair-card"><div class="no-signals">Connecting...</div></div>
    <div class="pair-card"><div class="no-signals">Connecting...</div></div>
    <div class="pair-card"><div class="no-signals">Connecting...</div></div>
    <div class="pair-card"><div class="no-signals">Connecting...</div></div>
  </div>

  <!-- ACTIVE SIGNAL DETAIL CARDS -->
  <div class="signals-section">
    <div class="section-title">Active Signals</div>
    <div class="signal-cards" id="signal-cards">
      <div class="no-signals" style="grid-column:1/-1;">No active signals yet — waiting for scan</div>
    </div>
  </div>

  <!-- BOT LOG -->
  <div class="log-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:0.5px solid #1a1a1a;background:#0f0f0f;">
      <span style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.4px;">Bot Log</span>
      <button class="scan-btn" id="scan-btn">⟳ Scan Now</button>
    </div>
    <div class="llist" id="llist"></div>
  </div>
</div>

<script>
let data=[], logs=[], scanTimer=60, scanning=false;

function ts(){ return new Date().toUTCString().slice(17,25); }
function log(msg, type='info'){
  logs.unshift({t:ts(), msg, type});
  if(logs.length>60) logs.pop();
  renderLog();
}

function fPrice(p){
  if(!p && p!==0) return '--';
  if(p>=10000) return '$'+p.toLocaleString('en',{maximumFractionDigits:0});
  if(p>=1000)  return '$'+p.toLocaleString('en',{maximumFractionDigits:1});
  if(p>=1)     return '$'+p.toFixed(2);
  if(p>=0.01)  return '$'+p.toFixed(4);
  return '$'+p.toFixed(6);
}

function stars(c, cls){
  const col = c===3?'g':c===2?'y':'muted';
  return `<span class="${cls||col}">${'★'.repeat(c)}${'☆'.repeat(3-c)}</span>`;
}

function confPct(s, dir) {
  let agree=0;
  if(dir==='BUY'){
    if(s.rsi<45) agree++;
    if(s.macd&&s.macd.bull) agree++;
    if(s.bb&&s.bb.pctB<0.4) agree++;
    if(s.trend4h&&s.trend4h.trend==='bull') agree++;
  } else {
    if(s.rsi>55) agree++;
    if(s.macd&&!s.macd.bull) agree++;
    if(s.bb&&s.bb.pctB>0.6) agree++;
    if(s.trend4h&&s.trend4h.trend==='bear') agree++;
  }
  return Math.round((agree/4)*100);
}

function leverage(conf){
  if(conf>=80) return '3x–5x';
  if(conf>=65) return '2x–3x';
  if(conf>=50) return '1x–2x';
  return '1x (spot)';
}

function buildReasoning(s, sig){
  const parts=[];
  if(sig.dir==='BUY'){
    if(s.rsi<38) parts.push(`RSI ${s.rsi} — oversold`);
    if(s.macd&&s.macd.bull) parts.push('MACD bullish');
    if(s.bb&&s.bb.pctB<0.3) parts.push(`BB at lower band (${s.bb.pct}%)`);
    if(s.pct24h<-2) parts.push(`24h down ${s.pct24h.toFixed(1)}% — mean reversion potential`);
    if(s.trend4h&&s.trend4h.trend==='bull') parts.push('4H trend aligned');
  } else {
    if(s.rsi>62) parts.push(`RSI ${s.rsi} — overbought`);
    if(s.macd&&!s.macd.bull) parts.push('MACD bearish');
    if(s.bb&&s.bb.pctB>0.7) parts.push(`BB at upper band (${s.bb.pct}%)`);
    if(s.pct24h>2) parts.push(`24h up ${s.pct24h.toFixed(1)}% — reversal risk`);
    if(s.trend4h&&s.trend4h.trend==='bear') parts.push('4H trend aligned');
  }
  if(!parts.length) parts.push('Multiple indicators in confluence');
  return parts.join(' · ') + `.`;
}

function renderPairCards(){
  const grid = document.getElementById('pairs-grid');
  if(!data.length){ grid.innerHTML='<div class="no-signals">No data</div>'; return; }

  grid.innerHTML = data.map(s => {
    const hasBuy  = s.signals && s.signals.some(x=>x.dir==='BUY');
    const hasSell = s.signals && s.signals.some(x=>x.dir==='SELL');
    const hasHC   = s.signals && s.signals.some(x=>x.conf===3);
    const cardCls = hasHC?'has-hc':hasBuy?'has-buy':hasSell?'has-sell':'';

    const pctCls  = s.pct24h>=0?'pos':'neg';
    const pctSign = s.pct24h>=0?'+':'';
    const rsiCls  = s.rsi<38?'g':s.rsi>62?'r':'muted';
    const macdCls = s.macd&&s.macd.bull?'g':'r';
    const bbCls   = s.bb&&s.bb.pctB<0.3?'g':s.bb&&s.bb.pctB>0.7?'r':'muted';
    const tCls    = s.trend4h&&s.trend4h.trend==='bull'?'g':'r';

    // Signal rows
    const buySig  = s.signals&&s.signals.find(x=>x.dir==='BUY');
    const sellSig = s.signals&&s.signals.find(x=>x.dir==='SELL');

    const sigRows = [
      buySig  ? `<div class="pc-sig-row">
        <span class="pc-sig-tf">1H Scalp</span>
        <span class="pc-sig-dir sig-buy">BUY</span>
        <span class="pc-sig-score ${buySig.score>=7.5?'g':'y'}">${buySig.score}/10</span>
        <span class="pc-sig-stars">${stars(buySig.conf)}</span>
        <span class="pc-sig-trend ${buySig.aligned?'g':'y'}">${buySig.aligned?'✓':'↯'}</span>
      </div>` : '',
      buySig&&buySig.swing==='BUY' ? `<div class="pc-sig-row">
        <span class="pc-sig-tf">4H Swing</span>
        <span class="pc-sig-dir sig-buy">BUY</span>
        <span class="pc-sig-score ${buySig.score>=7.5?'g':'y'}">${buySig.score}/10</span>
        <span class="pc-sig-stars">${stars(buySig.conf)}</span>
        <span class="pc-sig-trend ${buySig.aligned?'g':'y'}">${buySig.aligned?'✓':'↯'}</span>
      </div>` : '',
      sellSig ? `<div class="pc-sig-row">
        <span class="pc-sig-tf">1H Scalp</span>
        <span class="pc-sig-dir sig-sell">SELL</span>
        <span class="pc-sig-score ${sellSig.score>=7.5?'g':'y'}">${sellSig.score}/10</span>
        <span class="pc-sig-stars">${stars(sellSig.conf)}</span>
        <span class="pc-sig-trend ${sellSig.aligned?'g':'y'}">${sellSig.aligned?'✓':'↯'}</span>
      </div>` : '',
      sellSig&&sellSig.swing==='SELL' ? `<div class="pc-sig-row">
        <span class="pc-sig-tf">4H Swing</span>
        <span class="pc-sig-dir sig-sell">SELL</span>
        <span class="pc-sig-score ${sellSig.score>=7.5?'g':'y'}">${sellSig.score}/10</span>
        <span class="pc-sig-stars">${stars(sellSig.conf)}</span>
        <span class="pc-sig-trend ${sellSig.aligned?'g':'y'}">${sellSig.aligned?'✓':'↯'}</span>
      </div>` : '',
      (!buySig&&!sellSig) ? `<div class="pc-sig-row"><span class="pc-sig-dir sig-hold" style="color:#333">No signal</span></div>` : ''
    ].filter(Boolean).join('');

    return `<div class="pair-card ${cardCls}">
      <div class="pc-header">
        <span class="pc-name">${s.sym}/USDT</span>
        <span class="pc-price">${fPrice(s.price)}</span>
        <span class="pc-pct ${pctCls}">${pctSign}${s.pct24h.toFixed(2)}%</span>
      </div>
      <div class="pc-indicators">
        <div class="pc-ind"><div class="pc-ind-label">RSI(14)</div><div class="pc-ind-val ${rsiCls}">${s.rsi}</div></div>
        <div class="pc-ind"><div class="pc-ind-label">MACD</div><div class="pc-ind-val ${macdCls}">${s.macd&&s.macd.bull?'▲ BULL':'▼ BEAR'}</div></div>
        <div class="pc-ind"><div class="pc-ind-label">BB %B</div><div class="pc-ind-val ${bbCls}">${s.bb?s.bb.pct+'%':'--'}</div></div>
        <div class="pc-ind"><div class="pc-ind-label">4H Trend</div><div class="pc-ind-val ${tCls}">${s.trend4h?s.trend4h.trend.toUpperCase():'—'}</div></div>
      </div>
      <div class="pc-signals">${sigRows}</div>
    </div>`;
  }).join('');
}

function renderSignalCards(){
  const container = document.getElementById('signal-cards');
  const allSigs = [];
  data.forEach(s => {
    if(s.signals) s.signals.forEach(sig => allSigs.push({...sig, pairData: s}));
  });

  if(!allSigs.length){
    container.innerHTML = '<div class="no-signals" style="grid-column:1/-1;">No active signals — market may be ranging. Next scan in ' + scanTimer + 's</div>';
    return;
  }

  // Sort by score desc
  allSigs.sort((a,b) => b.score - a.score);

  container.innerHTML = allSigs.map(sig => {
    const s = sig.pairData;
    const isHC = sig.conf === 3;
    const dirCls = sig.dir === 'BUY' ? 'buy' : 'sell';
    const scoreClass = sig.score >= 7.5 ? 'high' : 'mid';
    const cp = confPct(s, sig.dir);
    const lev = leverage(cp);
    const reasoning = buildReasoning(s, sig);
    const noteCls = sig.aligned ? 'confirmed' : 'counter';

    return `<div class="sig-card ${dirCls} ${isHC?'hc':''}">
      <div class="sig-card-header">
        <span class="sig-card-pair">${s.sym}/USDT</span>
        <span class="sig-card-dir ${dirCls}">${sig.dir}</span>
      </div>
      <div class="sig-card-scores">
        <div class="score-ring ${scoreClass}">
          <span class="score-num ${scoreClass==='high'?'g':'y'}">${sig.score}</span>
          <span class="score-sub">/10</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:5px;">
          <span class="conf-pill ${isHC?'conf-high':'conf-mid'}">${cp}% confidence</span>
          <div style="display:flex;gap:5px;">
            ${stars(sig.conf)}
            <span class="tf-pill">1H + 4H</span>
          </div>
        </div>
      </div>
      <div class="sig-card-fields">
        <div class="field"><span class="field-label">Entry</span><span class="field-val">${fPrice(s.price)}</span></div>
        <div class="field"><span class="field-label">Stop Loss</span><span class="field-val red">${fPrice(sig.sl)}</span></div>
        <div class="field"><span class="field-label">TP1</span><span class="field-val green">${fPrice(sig.tp1)}</span></div>
        <div class="field"><span class="field-label">TP2</span><span class="field-val green">${fPrice(sig.tp2)}</span></div>
        <div class="field"><span class="field-label">Leverage</span><span class="field-val yellow">${lev}</span></div>
        <div class="field"><span class="field-label">ATR(14)</span><span class="field-val">${fPrice(s.atr)}</span></div>
        <div class="field"><span class="field-label">RSI</span><span class="field-val ${s.rsi<38?'green':s.rsi>62?'red':''}">${s.rsi}</span></div>
        <div class="field"><span class="field-label">BB Position</span><span class="field-val">${s.bb?s.bb.pct+'%':'--'}</span></div>
      </div>
      <div class="field" style="padding:6px 14px 0;"><span class="field-label">Invalidation</span><span class="field-val" style="font-size:10px;color:#666;">${sig.dir==='BUY'?'Close below '+fPrice(sig.sl):'Close above '+fPrice(sig.sl)}</span></div>
      ${sig.trendNote ? `<div class="sig-card-note ${noteCls}">${sig.trendNote}</div>` : ''}
      <div class="sig-card-reasoning">${reasoning}</div>
    </div>`;
  }).join('');
}

function renderLog(){
  document.getElementById('llist').innerHTML = logs.map(l => {
    const cls = l.type==='buy'?'lbuy':l.type==='sell'?'lsell':l.type==='info'?'linfo':l.type==='err'?'lerr':'lm';
    return `<div class="li"><span class="lt">${l.t}</span><span class="${cls}">${l.msg}</span></div>`;
  }).join('');
}

async function runScan(){
  if(scanning) return;
  scanning=true;
  const btn=document.getElementById('scan-btn');
  btn.disabled=true; btn.textContent='⟳ Scanning...';
  log('Scanning BTC · ETH · SOL · BNB...','info');

  try{
    const res  = await fetch('/api/scan');
    const json = await res.json();
    if(!json.ok) throw new Error(json.error||'Server error');

    data = json.data;
    let buys=0, sells=0, hc=0;
    data.forEach(s => {
      if(s.signals) s.signals.forEach(sig => {
        if(sig.dir==='BUY')  { buys++;  if(sig.conf===3) hc++; log(`BUY: ${s.sym} — Score ${sig.score}/10 ${sig.conf===3?'★★★':'★★'}`, 'buy'); }
        if(sig.dir==='SELL') { sells++; if(sig.conf===3) hc++; log(`SELL: ${s.sym} — Score ${sig.score}/10 ${sig.conf===3?'★★★':'★★'}`, 'sell'); }
      });
    });

    document.getElementById('s-buy').textContent  = buys;
    document.getElementById('s-sell').textContent = sells;
    document.getElementById('s-hc').textContent   = hc;

    if(buys===0&&sells===0) log('No signals this scan — market ranging or consolidating','info');
    log(`Scan complete — ${buys} buy · ${sells} sell · ${hc} ★★★`,'info');

    renderPairCards();
    renderSignalCards();
    scanTimer = 60;
  } catch(e){
    log('Error: '+e.message,'err');
    scanTimer=15;
  }

  btn.disabled=false; btn.textContent='⟳ Scan Now';
  scanning=false;
}

document.getElementById('scan-btn').addEventListener('click', runScan);

setInterval(()=>{
  document.getElementById('clock').textContent = ts()+' UTC';
  if(!scanning){
    scanTimer--;
    document.getElementById('s-next').textContent = scanTimer+'s';
    if(scanTimer<=0) runScan();
  }
},1000);

runScan();
</script>
</body>
</html>
